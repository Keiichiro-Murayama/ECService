name: .NET ECService CD


on:
  workflow_run:
      #ここはCIファイル内の「name:」と完全一致させる
   workflows:
      - ".NET CI/CD"
   types:
   - completed
   branches:
     - main


jobs:
  deploy:
    name: Azure VMへデプロイ

    # CIが成功した場合だけデプロイする
    #f: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      # workflow_runを発生させた、CI検証済みのコミットを取得する
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha}}

      # プロジェクトは.NET 10なので10を指定
      - name: .NET SDKをセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # GitHub Runner上でLinux向けに発行
      - name: アプリケーションを発行
        run: |
          dotnet publish src/ECService.Presentation/ECService.Presentation.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output ./publish

      # VMの初期設定と、古い配置ファイルの削除
      - name: VMのデプロイ先を準備
        uses: appleboy/ssh-action@v1
        with:
         host: ${{ secrets.ECSERVICE_AZURE_HOST }}
         username: ${{ secrets.ECSERVICE_AZURE_USER }}
         key: ${{ secrets.ECSERVICE_AZURE_SECRET }}
         script: |
          set -e
  
          echo "=== VM preparation ==="

          sudo apt-get update
          sudo apt-get install -y nginx aspnetcore-runtime-10.0

          dotnet --list-runtimes

          sudo mkdir -p /var/www/ecservice
          sudo chown -R "$(whoami)":"$(whoami)" /var/www/ecservice
          rm -rf /var/www/ecservice/*

            echo "=== VM preparation ==="

            # 初回実行時に必要なソフトウェアを準備
            sudo apt-get update
            sudo apt-get install -y nginx aspnetcore-runtime-10.0

            echo "=== Installed runtimes ==="
            dotnet --list-runtimes

            echo "=== Preparing directory ==="
            sudo mkdir -p /var/www/ecservice
            sudo chown -R "$(whoami)":"$(whoami)" /var/www/ecservice

            # 転送前に古いファイルを削除
            rm -rf /var/www/ecservice/*

      # publishフォルダの中身をVMへ転送
      - name: 発行ファイルをVMへ転送
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ECSERVICE_AZURE_HOST }}
          username: ${{ secrets.ECSERVICE_AZURE_USER }}
          key: ${{ secrets.ECSERVICE_AZURE_SECRET }}
          source: "./publish/*"
          target: "/var/www/ecservice"
          strip_components: 1
          overwrite: true

      # systemdとNginxを設定してアプリを起動
      - name: APIサービスを起動
        uses: appleboy/ssh-action@v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.ECSERVICE_DB_CONNECTION_STRING }}
          SERVICE_USER: ${{ secrets.ECSERVICE_AZURE_USER }}
        with:
         host: ${{ secrets.ECSERVICE_AZURE_HOST }}
         username: ${{ secrets.ECSERVICE_AZURE_USER }}
         key: ${{ secrets.ECSERVICE_AZURE_SECRET }}
         script: |
          set -e

          echo "=== VM preparation ==="

          sudo apt-get update
          sudo apt-get install -y nginx aspnetcore-runtime-10.0

          dotnet --list-runtimes

          sudo mkdir -p /var/www/ecservice
          sudo chown -R "$(whoami)":"$(whoami)" /var/www/ecservice
          rm -rf /var/www/ecservice/*

            echo "=== Creating environment file ==="

            # DB接続文字列をsystemdの環境ファイルとして保存
            sudo install -m 600 /dev/null /etc/ecservice.env

            sudo env DB_CONNECTION_STRING="$DB_CONNECTION_STRING" \
              bash -c 'printf "%s\n" \
              "ConnectionStrings__ECServiceDB=${DB_CONNECTION_STRING}" \
              > /etc/ecservice.env'

            echo "=== Configuring systemd ==="

            sudo tee /etc/systemd/system/ecservice.service > /dev/null <<EOF
            [Unit]
            Description=ECService ASP.NET Core API
            After=network.target

            [Service]
            WorkingDirectory=/var/www/ecservice
            ExecStart=/usr/bin/dotnet /var/www/ecservice/ECService.Presentation.dll
            Restart=always
            RestartSec=10
            KillSignal=SIGINT
            SyslogIdentifier=ecservice
            User=${SERVICE_USER}

            Environment=ASPNETCORE_ENVIRONMENT=Production
            Environment=ASPNETCORE_URLS=http://127.0.0.1:5000
            EnvironmentFile=/etc/ecservice.env

            [Install]
            WantedBy=multi-user.target
            EOF

            echo "=== Configuring Nginx ==="

            sudo tee /etc/nginx/sites-available/ecservice > /dev/null <<'EOF'
            server {
                listen 80;
                listen [::]:80;

                server_name _;

                location / {
                    proxy_pass http://127.0.0.1:5000;
                    proxy_http_version 1.1;

                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection keep-alive;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF

            # Nginx設定を有効化
            sudo ln -sfn \
              /etc/nginx/sites-available/ecservice \
              /etc/nginx/sites-enabled/ecservice

            sudo rm -f /etc/nginx/sites-enabled/default

            echo "=== Validating Nginx ==="
            sudo nginx -t

            echo "=== Restarting services ==="
            sudo systemctl daemon-reload
            sudo systemctl enable ecservice.service
            sudo systemctl restart ecservice.service

            sudo systemctl enable nginx
            sudo systemctl restart nginx

            echo "=== Service status ==="
            sudo systemctl --no-pager --full status ecservice.service

            echo "=== Local API check ==="
            sleep 5
            curl --fail --show-error http://127.0.0.1:5000/ || true

            echo "=== Deployment completed ==="