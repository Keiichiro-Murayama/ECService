name: .NET CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ECService.slnx

      - name: Build
        run: dotnet build ECService.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ECService.slnx --no-build --configuration Release